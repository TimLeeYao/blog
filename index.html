  <script src="js/articles.js"></script>
  <script>
    (function () {
      const articles = window.BLOG_ARTICLES;
      // function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
      function formatDate(d) {
        if (!d) return '';
        return new Date(d).toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
      }

      // const categories = ['notes', 'reports', 'poems'];
      // const latestHTML = categories.map(cat => {
      //   const posts = articles
      //     .filter(a => a.category === cat)
      //     .sort((a, b) => new Date(b.date) - new Date(a.date))
      //     .slice(0, 3);
      //   return `
      //     <section class="category-section">
      //       <h2 class="category-title"><a href="${cat}/index.html">${capitalize(cat)}</a></h2>
      //       <ul class="post-list">
      //         ${posts.map(p => `
      //           <li>
      //             <a href="${p.url}" class="post-link">
      //               <span class="post-title">${p.title}</span>
      //               <span class="post-date">${formatDate(p.date)}</span>
      //             </a>
      //           </li>`).join('')}
      //       </ul>
      //       ${articles.filter(a => a.category === cat).length > 3
      //       ? `<a href="${cat}/index.html" class="view-all">查看全部 →</a>` : ''}
      //     </section>`;
      // }).join('');
      const categories = [
        { key: '笔记', folder: 'notes' },
        { key: '报告', folder: 'reports' },
        { key: '诗歌', folder: 'poems' }
      ];

      const latestHTML = categories.map(({ key, folder }) => {
        const posts = articles
          .filter(a => a.category === key)
          .sort((a, b) => new Date(b.date) - new Date(a.date))
          .slice(0, 3);
        return `
    <section class="category-section">
      <h2 class="category-title"><a href="${folder}/index.html">${key}</a></h2>
      <ul class="post-list">
        ${posts.map(p => `
          <li>
            <a href="${p.url}" class="post-link">
              <span class="post-title">${p.title}</span>
              <span class="post-date">${formatDate(p.date)}</span>
            </a>
          </li>`).join('')}
      </ul>
      ${articles.filter(a => a.category === key).length > 3
            ? `<a href="${folder}/index.html" class="view-all">查看全部 →</a>` : ''}
    </section>`;
      }).join('');
      document.getElementById('latest-posts').innerHTML = latestHTML;

      const tagCount = {};
      articles.forEach(a => a.tags.forEach(t => tagCount[t] = (tagCount[t] || 0) + 1));
      const tagHTML = Object.entries(tagCount)
        .sort(([, a], [, b]) => b - a)
        .map(([tag, count]) =>
          `<a href="tags.html?tag=${encodeURIComponent(tag)}" class="tag-item">${tag} (${count})</a>`
        ).join('');
      document.getElementById('tag-cloud').innerHTML = `<div class="tags">${tagHTML}</div>`;
    })();
  </script>
  <script src="js/theme.js"></script>
</body>
