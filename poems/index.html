<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>诗歌 - 麦田里的阅读者</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-left">
      <div class="nav-icon">
        <img src="../images/icon.jpg" alt="站点图标">
      </div>
      <a href="../index.html" class="nav-title">麦田里的阅读者</a>
    </div>
    <div class="nav-links">
      <a href="../notes/index.html">笔记</a>
      <a href="../reports/index.html">报告</a>
      <a href="../poems/index.html">诗歌</a>
      <a href="../tags.html">标签</a>
    </div>
  </nav>

  <main class="container">
    <h1>诗歌</h1>
    <div id="post-list"></div>
    <div id="pagination" class="pagination"></div>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <div class="footer-section">
        <h3>联系我</h3>
        <p>📧 <a href="mailto:timlee20201021@163.com">timlee20201021@163.com</a></p>
        <p>🔗 <a href="https://github.com/TimLeeYao" target="_blank">GitHub主页</a></p>
      </div>
      <div class="footer-section">
        <h3>扫码直达</h3>
        <img src="../images/qrcode.jpg" alt="QR Code" class="qr-code">
      </div>
    </div>
    <p class="copyright">© 麦田里的阅读者</p>
  </footer>

  <script src="../js/articles.js"></script>
  <script>
    (function() {
      const cat = '诗歌';   // 对于 reports 改为 'reports'，poems 改为 'poems'
      document.title = '诗歌 - 麦田里的阅读者';

      const articles = window.BLOG_ARTICLES
        .filter(a => a.category === cat)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
      const perPage = 5;
      const params = new URLSearchParams(window.location.search);
      let page = parseInt(params.get('page')) || 1;
      const totalPages = Math.ceil(articles.length / perPage);
      if (page < 1) page = 1;
      if (page > totalPages) page = totalPages;
      const start = (page - 1) * perPage;
      const pagedArticles = articles.slice(start, start + perPage);

      document.getElementById('post-list').innerHTML = `
        <ul class="post-list">
          ${pagedArticles.map(p => `
            <li>
              <a href="../${p.url}" class="post-link">
                <span class="post-title">${p.title}</span>
                <span class="post-date">${formatDate(p.date)}</span>
              </a>
              <div class="article-tags">
                ${p.tags.map(t => `<a href="../tags.html?tag=${encodeURIComponent(t)}" class="tag-item small">${t}</a>`).join('')}
              </div>
            </li>`).join('')}
        </ul>`;

      if (totalPages > 1) {
        let pagHTML = '';
        for (let i = 1; i <= totalPages; i++) {
          if (i === page) {
            pagHTML += `<span class="current">${i}</span>`;
          } else {
            pagHTML += `<a href="?page=${i}">${i}</a>`;
          }
        }
        document.getElementById('pagination').innerHTML = pagHTML;
      }

      function formatDate(d) {
        if (!d) return '';
        return new Date(d).toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' });
      }
    })();
  </script>
  <script src="../js/theme.js"></script>
</body>
</html>
